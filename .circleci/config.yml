version: 2.1

# ========================
# Pipeline Parameters
# ========================
  # Note: run_release and run_testflight_deploy are mutually exclusive.
  # Only one should be true per pipeline trigger.
parameters:
  run_release:
    type: boolean
    default: false
  run_testflight_deploy:
    type: boolean
    default: false
  release_version:
    type: string
    default: ""
  release_notes:
    type: string
    default: ""
  # String type (not boolean) because GitHub Actions passes values via jq --arg which produces strings
  with_local_binary:
    type: string
    default: "true"

# ========================
# Executors
# ========================
executors:
  macos-xcode:
    macos:
      xcode: "26.1.1"
    resource_class: m4pro.medium
    environment:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "YES"
      LC_ALL: "en_US.UTF-8"
      LANG: "en_US.UTF-8"

# ========================
# Orbs
# ========================
orbs:
  macos: circleci/macos@2
  aws-cli: circleci/aws-cli@4.0.0
  github-cli: circleci/github-cli@2.7.2
  attentive: attentive-mobile/circleci-orb@0.0.11
  slack: circleci/slack@6.1.3

# ========================
# Constants
# ========================
fastlane_reports_dir: &fastlane_reports_dir "fastlane/reports"
fastlane_build_output_dir: &fastlane_build_output_dir "fastlane/build"
fastlane_test_output_dir: &fastlane_test_output_dir "fastlane/test_output"

# ========================
# Commands (Reusable)
# ========================
commands:
  notify-slack-on-failure:
    description: "Send Slack notification on job failure"
    steps:
      - run:
          name: Build Slack PR context
          when: on_fail
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ]; then
              PR_NUMBER="${CIRCLE_PULL_REQUEST##*/}"
              PR_TITLE=$(curl -sf \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${PR_NUMBER}" \
                | jq -r '.title // empty')
              if [ -n "$PR_TITLE" ]; then
                # Escape characters that would break JSON
                PR_TITLE=$(echo "$PR_TITLE" | sed 's/\\/\\\\/g; s/"/\\"/g')
                echo "export SLACK_PR_FIELD=',{\"type\":\"mrkdwn\",\"text\":\"*PR:*\n<$CIRCLE_PULL_REQUEST|#${PR_NUMBER}: ${PR_TITLE}>\"}'" >> "$BASH_ENV"
              else
                echo "export SLACK_PR_FIELD=',{\"type\":\"mrkdwn\",\"text\":\"*PR:*\n<$CIRCLE_PULL_REQUEST|#${PR_NUMBER}>\"}'" >> "$BASH_ENV"
              fi
              echo "export SLACK_PR_BUTTON=',{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"View PR\"},\"url\":\"$CIRCLE_PULL_REQUEST\"}'" >> "$BASH_ENV"
            else
              echo 'export SLACK_PR_FIELD=""' >> "$BASH_ENV"
              echo 'export SLACK_PR_BUTTON=""' >> "$BASH_ENV"
            fi
      - slack/notify:
          channel: eng-mobile-sdk-ci-alerts-ios
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Job Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Job:*\n${CIRCLE_JOB}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${CIRCLE_BRANCH}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${CIRCLE_USERNAME}" },
                    { "type": "mrkdwn", "text": "*Project:*\n${CIRCLE_PROJECT_REPONAME}" },
                    { "type": "mrkdwn", "text": "*Workflow:*\n${CIRCLE_WORKFLOW_NAME}" }${SLACK_PR_FIELD}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Job" },
                      "url": "${CIRCLE_BUILD_URL}"
                    }${SLACK_PR_BUTTON}
                  ]
                }
              ]
            }

  notify-slack-on-release-success:
    description: "Send Slack notification on successful SDK release"
    steps:
      - slack/notify:
          channel: eng-mobile-sdk-releases
          event: pass
          custom: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ SDK Release Published",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n${RELEASE_VERSION}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${CIRCLE_USERNAME}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Release" },
                      "url": "https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases/tag/${RELEASE_VERSION}"
                    }
                  ]
                }
              ]
            }

  notify-slack-on-testflight-success:
    description: "Send Slack notification on successful TestFlight deploy"
    steps:
      - slack/notify:
          channel: eng-mobile-sdk-releases
          event: pass
          custom: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ TestFlight Build Deployed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\n${CIRCLE_BRANCH}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${CIRCLE_USERNAME}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Job" },
                      "url": "${CIRCLE_BUILD_URL}"
                    }
                  ]
                }
              ]
            }

  setup-fastlane:
    description: "Install Fastlane via Bundler"
    steps:
      - restore_cache:
          keys:
            - v1-gems-{{ checksum "Gemfile.lock" }}
            - v1-gems-
      - macos/switch-ruby:
          version: "3.3"
      - run:
          name: Install Bundler Dependencies
          command: |
            bundle config set --local path 'vendor/bundle'
            bundle install
      - save_cache:
          key: v1-gems-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

# ========================
# Jobs
# ========================
jobs:
  # -----------------------
  # Checkout and Setup
  # -----------------------
  checkout-and-setup:
    executor: macos-xcode
    steps:
      - checkout

      # TODO: Remove after testing Slack notifications
      - run:
          name: Test Slack notification (REMOVE ME)
          command: exit 1

      # Setup Fastlane
      - setup-fastlane

      # Cache Swift Package Manager dependencies
      - restore_cache:
          keys:
            - v1-spm-{{ checksum "Package.resolved" }}
            - v1-spm-

      # Resolve dependencies via Fastlane
      - run:
          name: Setup Dependencies via Fastlane
          command: bundle exec fastlane setup

      - save_cache:
          key: v1-spm-{{ checksum "Package.resolved" }}
          paths:
            - ~/.swiftpm
            - ~/Library/Developer/Xcode/DerivedData

      - persist_to_workspace:
          root: .
          paths:
            - .

      - notify-slack-on-failure

  # -----------------------
  # Lint
  # -----------------------
  lint:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Run SwiftLint via Fastlane
          command: bundle exec fastlane lint

      - store_test_results:
          path: *fastlane_reports_dir

      - notify-slack-on-failure

  # -----------------------
  # Build Framework
  # -----------------------
  build-framework:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Build Framework via Fastlane
          command: bundle exec fastlane build_framework

      - persist_to_workspace:
          root: .
          paths:
            - *fastlane_build_output_dir

      - notify-slack-on-failure

  # -----------------------
  # Assemble XCFramework
  # -----------------------
  assemble-xcframework:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Assemble XCFramework via Fastlane
          command: bundle exec fastlane assemble_xcframework

      - persist_to_workspace:
          root: .
          paths:
            - *fastlane_build_output_dir

      - store_artifacts:
          path: *fastlane_build_output_dir

      - notify-slack-on-failure

  # -----------------------
  # Build Examples
  # -----------------------
  build-examples:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Build Example Apps via Fastlane
          command: bundle exec fastlane build_examples

      - notify-slack-on-failure

  # -----------------------
  # Build Bonni with XCFramework
  # -----------------------
  build-bonni-with-binary:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Build Bonni with XCFramework via Fastlane
          command: bundle exec fastlane build_bonni with_binary_framework:true

      - notify-slack-on-failure

  # -----------------------
  # Build Bonni release
  # -----------------------
  build-bonni-release:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - aws-cli/setup:
          region: AWS_REGION
          role_arn: 'arn:aws:iam::026393418737:role/circleci'
          role_session_name: $CIRCLE_JOB-<< pipeline.number >>

      - setup-fastlane

      - run:
          name: Build Bonni release via Fastlane
          command: bundle exec fastlane build_bonni_release with_local_binary:<< pipeline.parameters.with_local_binary >>

      - persist_to_workspace:
          root: .
          paths:
            - *fastlane_build_output_dir

      - store_artifacts:
          path: *fastlane_build_output_dir

      - notify-slack-on-failure

  # -----------------------
  # Unit Tests
  # -----------------------
  unit-tests:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Run Unit Tests via Fastlane
          command: bundle exec fastlane unit_test

      - store_test_results:
          path: *fastlane_test_output_dir

      - store_artifacts:
          path: *fastlane_test_output_dir

      - notify-slack-on-failure

  # -----------------------
  # Validate CocoaPods Spec
  # -----------------------
  validate-podspec:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - restore_cache:
          keys:
            - v1-cocoapods-{{ checksum "ATTNSDKFramework.podspec" }}
            - v1-cocoapods-

      - run:
          name: Validate Podspec via Fastlane
          command: bundle exec fastlane validate_podspec

      - save_cache:
          key: v1-cocoapods-{{ checksum "ATTNSDKFramework.podspec" }}
          paths:
            - ~/Library/Caches/CocoaPods

      - notify-slack-on-failure

  # -----------------------
  # Validate Swift Package Manager
  # -----------------------
  validate-spm:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Validate Swift Package via Fastlane
          command: bundle exec fastlane validate_spm

      - notify-slack-on-failure

  # -----------------------
  # Release SDK
  # -----------------------
  release:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - attentive/app-based-github-token:
          github_app_client_id: ${GITHUB_APP_CLIENT_ID}
          github_app_private_key_base64: ${GITHUB_APP_PRIVATE_KEY_BASE64}
          github_app_installation_id: ${GITHUB_APP_INSTALLATION_ID}

      - github-cli/setup

      - run:
          name: Create release for SDK via Fastlane
          environment:
            RELEASE_VERSION: << pipeline.parameters.release_version >>
            RELEASE_NOTES: << pipeline.parameters.release_notes >>
          command: bundle exec fastlane create_release version:"${RELEASE_VERSION}" release_notes:"${RELEASE_NOTES}"

      - notify-slack-on-release-success
      - notify-slack-on-failure

  # -----------------------
  # Deploy to TestFlight
  # -----------------------
  deploy-testflight:
    executor: macos-xcode
    steps:
      - attach_workspace:
          at: .

      - setup-fastlane

      - run:
          name: Deploy to TestFlight via Fastlane
          command: bundle exec fastlane deploy_testflight

      - notify-slack-on-testflight-success
      - notify-slack-on-failure

# ========================
# Workflows
# ========================
workflows:
  version: 2

  # Release workflow triggered via API (GitHub Actions)
  release-sdk:
    when: << pipeline.parameters.run_release >>
    jobs:
      - checkout-and-setup:
          context: org-global

      - lint:
          context: org-global
          requires:
            - checkout-and-setup

      - unit-tests:
          context: org-global
          requires:
            - checkout-and-setup

      - build-framework:
          context: org-global
          requires:
            - checkout-and-setup

      - validate-podspec:
          context: org-global
          requires:
            - checkout-and-setup

      - validate-spm:
          context: org-global
          requires:
            - checkout-and-setup

      - assemble-xcframework:
          context: org-global
          requires:
            - build-framework

      - build-examples:
          context: org-global
          requires:
            - lint
            - unit-tests
            - assemble-xcframework
            - validate-podspec
            - validate-spm

      - build-bonni-with-binary:
          context: org-global
          requires:
            - assemble-xcframework

      - build-bonni-release:
          context: org-global
          requires:
            - build-examples
            - assemble-xcframework

      - release:
          context: org-global
          requires:
            - build-examples
            - build-bonni-with-binary

      - deploy-testflight:
          context: org-global
          requires:
            - build-bonni-release
            - release

  # Deploy to TestFlight workflow triggered via API (GitHub Actions)
  deploy-testflight:
    when: << pipeline.parameters.run_testflight_deploy >>
    jobs:
      - checkout-and-setup:
          context: org-global

      - lint:
          context: org-global
          requires:
            - checkout-and-setup

      - unit-tests:
          context: org-global
          requires:
            - checkout-and-setup

      - build-framework:
          context: org-global
          requires:
            - checkout-and-setup

      - assemble-xcframework:
          context: org-global
          requires:
            - build-framework

      - build-bonni-release:
          context: org-global
          requires:
            - lint
            - unit-tests
            - assemble-xcframework

      - deploy-testflight:
          context: org-global
          requires:
            - build-bonni-release

  # Main workflow for all branches
  lint-validate-build-test:
    unless:
      or:
        - << pipeline.parameters.run_release >>
        - << pipeline.parameters.run_testflight_deploy >>
    jobs:
      - checkout-and-setup:
          context: org-global

      # Run these in parallel after setup
      - lint:
          context: org-global
          requires:
            - checkout-and-setup

      - unit-tests:
          context: org-global
          requires:
            - checkout-and-setup

      - build-framework:
          context: org-global
          requires:
            - checkout-and-setup

      - validate-podspec:
          context: org-global
          requires:
            - checkout-and-setup

      - validate-spm:
          context: org-global
          requires:
            - checkout-and-setup

      - assemble-xcframework:
          context: org-global
          requires:
            - build-framework

      - build-examples:
          context: org-global
          requires:
            - lint
            - unit-tests
            - assemble-xcframework
            - validate-podspec
            - validate-spm

      - build-bonni-with-binary:
          context: org-global
          requires:
            - assemble-xcframework

      - build-bonni-release:
          context: org-global
          requires:
            - assemble-xcframework
          filters:
            branches:
              only: main

